# Per docs/architecture/02_ERC8004_CONTRACT_DESIGN.md §1:
# Solidity 0.8.24+, evmVersion cancun, Foundry as the build/test framework.

[profile.default]
src              = "src"
out              = "out"
libs             = ["lib"]
test             = "test"
script           = "script"

solc_version     = "0.8.24"
evm_version      = "cancun"
optimizer        = true
optimizer_runs   = 200
via_ir           = false        # plain pipeline; turn on if/when bytecode size warrants

# Strict tests + reproducible fuzzing
verbosity        = 2
fuzz             = { runs = 256, max_test_rejects = 65536 }
invariant        = { runs = 64, depth = 32, fail_on_revert = true }

# Coverage report excludes test files & libs
[profile.default.coverage]
include          = ["src/**"]

# RPC endpoints — set these via env, never commit URLs with API keys
[rpc_endpoints]
base_sepolia     = "${BASE_SEPOLIA_RPC_URL}"
base_mainnet     = "${BASE_MAINNET_RPC_URL}"

[etherscan]
base_sepolia     = { key = "${BASESCAN_API_KEY}", chain = 84532 }
base             = { key = "${BASESCAN_API_KEY}", chain = 8453 }
