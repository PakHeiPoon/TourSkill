# fly.toml — Fly.io config for merchant-agent (single-merchant deploy)
#
# Deploy:
#   fly auth login                   # one-time
#   fly apps create concourse-wumingchu --org personal
#   fly volumes create agent_data --size 1 --region hkg --yes
#   fly secrets set \
#     IDENTITY_REGISTRY=0xBdE5A55D50d2062FF5529546d8c391f6a6eEA29f \
#     REPUTATION_REGISTRY=0xcaC08083B58c7736bDf953dafeC3C3395f0D90c6 \
#     CHAIN_ID=84532 \
#     RPC_URL=https://sepolia.base.org \
#     USDC_ADDRESS=0x036CbD53842c5426634e7929541eC2318f3dCF7e \
#     AGENT_OWNER_ADDRESS=0x56b0666c4fe6F3BA5572aC7AC99AF7Ede58b67b4 \
#     PUBLIC_URL=https://wumingchu.tourskill.paking.xyz
#   fly deploy

app = "concourse-wumingchu"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8787"
  STORE_URL = "file:/data/agent.db"
  STORE_DRIVER = "sqlite"

[[mounts]]
  source = "agent_data"
  destination = "/data"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
